---
#ISO info
default_iso_name:  first.iso  #default iso for ipxe menu
isos:
  - file_name: first.iso   #ISO file name in local folder
    menu_description: description of first iso   #description of ISO that will appear in the ipxe menu
    enabled: true

  - file_name: second.iso
    menu_description: description of second iso
    enabled: false

# pxe network info
USE_PXE_INTERFACE: false   # using a secondary network interface for the PXE network, rather than a single interface
# PXE DHCP configuration:
# (only needed if using pxe interface)
PXE_INTERFACE: ens19   # Secondary interface on a VLAN and subnet with no DHCP or internet connection
PXE_SUBNET: 10.250.0.0
PXE_NETMASK: 255.255.0.0
PXE_DNS_SERVER: 1.1.1.1, 8.8.8.8   #can have multiple DNS servers separated by a comma and a space (ex: 1.1.1.1, 8.8.8.8)


